name: Mise à jour actus foot

on:
  schedule:
    # Tous les jours à 7h00 UTC (9h00 Paris)
    - cron: '0 7 * * *'
  # Permet aussi de lancer manuellement depuis GitHub
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Récupération des actus
        run: python fetch_news.py

      - name: Commit et push du fichier articles.json
        run: |
          git config user.name "Onze Direct Bot"
          git config user.email "bot@onzedirect.com"
          git add articles.json
          git diff --staged --quiet || git commit -m "Actus foot du $(date +'%d/%m/%Y %H:%M')"
          git push
