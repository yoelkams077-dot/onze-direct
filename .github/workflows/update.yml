name: Mise à jour actus foot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Récupération des actus et scores
        run: python fetch_news.py

      - name: Récupération des vidéos YouTube
        run: python fetch_videos.py

      - name: Commit et push
        run: |
          git config user.name "Onze Direct Bot"
          git config user.email "bot@onzedirect.com"
          git add articles.json videos.json
          git diff --staged --quiet || git commit -m "Mise à jour du $(date +'%d/%m/%Y %H:%M')"
          git push
